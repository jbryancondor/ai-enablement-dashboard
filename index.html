<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Enablement Dashboard</title>
    <script>
      // Restore path encoded by 404.html redirect (spa-github-pages pattern).
      (function() {
        var q = window.location.search;
        if (q && q.indexOf('p=') !== -1) {
          var decoded = decodeURIComponent(q.slice(q.indexOf('p=') + 2).replace(/&/, '?'));
          window.history.replaceState(
            null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') + '/' + decoded
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
